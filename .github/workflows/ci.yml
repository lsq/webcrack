name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: true

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Check formatting
        run: pnpm format:check
        continue-on-error: true

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test
  test-msys2:
    runs-on: windows-latest
    defaults:
      run:
        # shell: msys2 {0}
        shell: pwsh
    env:
      MSYSTEM: UCRT64
      CHERE_INVOKING: 1
      MSYS2_PATH_TYPE: inherit
    strategy:
      matrix:
        node: [ 24 ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: jq base-devel binutils git mingw-w64-ucrt-x86_64-toolchain
          pacboy: >-
            yarn:p tree:
          update: true
          path-type: inherit
          release: false
      - name: Install pnpm
        run: corepack enable pnpm
      - name: Install
        run: pnpm install
      - name: Prepare test
        run: |
          corepack enable pnpm
          cd ./packages/webcrack
          echo "const ivm = require('isolated-vm');console.log('isolated-vm installed')" > rq.cjs
          node rq.cjs
          cd -
          tree node_modules/.pnpm/isolated-vm@*_patch*/node_modules/isolated-vm/
        shell: msys2 {0}
      - name: Test
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 6
          shell: cmd
          command: msys2 -c "pnpm test"

